<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikomi — Задачи</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:14px; }
  .page-header-left { display:flex; align-items:center; gap:12px; }
  .back-btn { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-secondary); text-decoration:none; padding:6px 10px; border-radius:var(--radius-sm); transition:all 0.15s; }
  .back-btn:hover { background:var(--border); color:var(--text); }
  .page-title { font-family:'Sora',sans-serif; font-size:20px; font-weight:700; color:var(--text); letter-spacing:-0.5px; }
  .page-subtitle { font-size:13px; color:var(--text-secondary); margin-top:2px; font-weight:300; }
  .toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:24px; }
  .toolbar .search-bar { flex:1; min-width:180px; }

  .kanban-board { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; align-items:start; }
  .kanban-column { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px; min-height:500px; transition:background 0.2s; }
  .kanban-column.drag-over { background:rgba(58,176,168,0.06); border-color:var(--primary); }
  .kanban-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .kanban-title { display:flex; align-items:center; gap:8px; font-family:'Sora',sans-serif; font-size:13px; font-weight:600; color:var(--text); }
  .kanban-dot { width:8px; height:8px; border-radius:50%; }
  .dot-todo  { background:var(--text-secondary); }
  .dot-doing { background:var(--primary); }
  .dot-done  { background:var(--success); }
  .kanban-count { font-size:11px; color:var(--text-secondary); background:var(--border); padding:2px 9px; border-radius:10px; font-weight:500; }

  .task-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px; margin-bottom:10px; cursor:grab; box-shadow:var(--shadow-sm); transition:all 0.2s; position:relative; user-select:none; }
  .task-card:hover  { box-shadow:var(--shadow-md); transform:translateY(-2px); }
  .task-card:active { cursor:grabbing; opacity:0.7; transform:scale(0.98); }
  .task-card.dragging { opacity:0.4; box-shadow:none; }
  .task-card.overdue { border-color:rgba(229,115,115,0.45); background:rgba(229,115,115,0.03); }
  .task-card.soon    { border-color:rgba(248,201,93,0.5);   background:rgba(248,201,93,0.03); }

  .task-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:6px; }
  .task-title { font-size:13px; font-weight:600; color:var(--text); line-height:1.35; flex:1; }
  .task-dots-btn { background:none; border:none; cursor:pointer; font-size:16px; color:var(--text-secondary); padding:0 4px; border-radius:4px; line-height:1; flex-shrink:0; transition:all 0.15s; }
  .task-dots-btn:hover { background:var(--bg); color:var(--text); }
  .task-desc { font-size:12px; color:var(--text-secondary); line-height:1.5; margin-bottom:10px; font-weight:300; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .task-tags { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .task-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:6px; }
  .task-deadline { font-size:11px; color:var(--text-secondary); display:flex; align-items:center; gap:4px; }
  .task-deadline.soon    { color:var(--warning); font-weight:500; }
  .task-deadline.overdue { color:var(--error);   font-weight:500; }
  .task-avatar { width:22px; height:22px; border-radius:50%; font-size:9px; font-weight:700; color:#fff; border:1.5px solid var(--card); display:flex; align-items:center; justify-content:center; }
  .add-task-col-btn { width:100%; padding:9px; border:1.5px dashed var(--border); border-radius:var(--radius-sm); background:transparent; font-size:12px; font-family:'DM Sans',sans-serif; color:var(--text-secondary); cursor:pointer; margin-top:4px; transition:all 0.15s; }
  .add-task-col-btn:hover { border-color:var(--primary); color:var(--primary); }

  .mascot-alert { margin-bottom:20px; animation:fadeUp 0.5s ease both; }
  .notif-mascot-img { width:60px; height:60px; object-fit:contain; flex-shrink:0; }

  .modal-overlay { display:none; }
  .modal-overlay.open { display:flex; }
  .modal.task-modal { max-width:580px; }

  .priority-selector { display:flex; gap:8px; flex-wrap:wrap; }
  .priority-btn { padding:6px 14px; border-radius:20px; border:1.5px solid var(--border); background:transparent; font-size:12px; font-weight:500; color:var(--text-secondary); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
  .priority-btn.active-high   { background:rgba(229,115,115,0.12); border-color:var(--error);   color:var(--error); }
  .priority-btn.active-medium { background:rgba(248,201,93,0.15);  border-color:var(--warning); color:#B8860B; }
  .priority-btn.active-low    { background:rgba(76,175,80,0.12);   border-color:var(--success); color:var(--success); }

  .comments-section { margin-top:20px; }
  .comment-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
  .comment-item:last-child { border-bottom:none; }
  .comment-avatar { width:28px; height:28px; border-radius:50%; background:var(--primary); font-size:11px; font-weight:700; color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .comment-author { font-size:12px; font-weight:600; color:var(--text); margin-bottom:2px; }
  .comment-text   { font-size:13px; color:var(--text-secondary); line-height:1.5; font-weight:300; }
  .comment-time   { font-size:10px; color:var(--text-secondary); margin-top:3px; }
  .comment-input-row { display:flex; gap:8px; margin-top:12px; align-items:flex-start; }

  @media (max-width:900px) { .kanban-board { grid-template-columns:1fr; } }
  @media (max-width:600px)  { .toolbar { flex-direction:column; } .page-header { flex-direction:column; align-items:flex-start; } }
</style>
</head>
<body>

<!-- ══ САЙДБАР ══ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon" style="width:32px;height:32px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
    </div>
    Nikomi
  </div>
  <a href="dashboard.html" class="sidebar-item"><span class="icon">🗂️</span> Мои проекты</a>
  <a href="tasks.html" class="sidebar-item active"><span class="icon">✅</span> Мои задачи</a>
  <a href="profile.html" class="sidebar-item"><span class="icon">👤</span> Профиль</a>
  <div class="sidebar-bottom">
    <button class="theme-toggle" id="themeToggle">
      <span id="themeIcon">🌙</span>
      <span id="themeLabel">Тёмная тема</span>
    </button>
    <a href="login.html" class="sidebar-item" style="margin-top:4px;"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>

<!-- ══ ОСНОВНОЙ КОНТЕНТ ══ -->
<main class="main-content">

  <!-- Персонаж — предупреждение (динамическое) -->
  <div id="taskAlertsContainer"></div>

  <!-- Шапка -->
  <div class="page-header">
    <div class="page-header-left">
      <a href="dashboard.html" class="back-btn">← Назад</a>
      <div>
        <div class="page-title" id="projectTitle">Загрузка...</div>
        <div class="page-subtitle" id="projectSubtitle">Загрузка...</div>
      </div>
    </div>
    <button class="btn-primary" onclick="openTaskModal()">+ Добавить задачу</button>
  </div>

  <!-- Тулбар -->
  <div class="toolbar">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" class="form-input" id="searchInput" placeholder="Поиск задач..." oninput="filterTasks()">
    </div>
    <select class="form-input" id="filterPriority" onchange="filterTasks()" style="width:auto;padding:10px 14px;">
      <option value="all">Все приоритеты</option>
      <option value="high">🔴 Высокий</option>
      <option value="medium">🟡 Средний</option>
      <option value="low">🟢 Низкий</option>
    </select>
  </div>

  <!-- Канбан-доска -->
  <div class="kanban-board" id="kanbanBoard">

    <!-- К ВЫПОЛНЕНИЮ -->
    <div class="kanban-column" id="col-todo"
      ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'todo')">
      <div class="kanban-header">
        <div class="kanban-title"><div class="kanban-dot dot-todo"></div>К выполнению</div>
        <span class="kanban-count" id="count-todo">0</span>
      </div>
      <div class="tasks-list" id="list-todo"></div>
      <button class="add-task-col-btn" onclick="openTaskModal('todo')">+ Добавить задачу</button>
    </div>

    <!-- В ПРОЦЕССЕ -->
    <div class="kanban-column" id="col-doing"
      ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'doing')">
      <div class="kanban-header">
        <div class="kanban-title"><div class="kanban-dot dot-doing"></div>В процессе</div>
        <span class="kanban-count" id="count-doing">0</span>
      </div>
      <div class="tasks-list" id="list-doing"></div>
      <button class="add-task-col-btn" onclick="openTaskModal('doing')">+ Добавить задачу</button>
    </div>

    <!-- ВЫПОЛНЕНО -->
    <div class="kanban-column" id="col-done"
      ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'done')">
      <div class="kanban-header">
        <div class="kanban-title"><div class="kanban-dot dot-done"></div>Выполнено</div>
        <span class="kanban-count" id="count-done">0</span>
      </div>
      <div class="tasks-list" id="list-done"></div>
      <button class="add-task-col-btn" onclick="openTaskModal('done')">+ Добавить задачу</button>
    </div>

  </div>
</main>

<!-- ══ МОДАЛКА: СОЗДАТЬ ЗАДАЧУ ══ -->
<div class="modal-overlay" id="taskModal" onclick="closeModalOutside(event,'taskModal')">
  <div class="modal task-modal animate-fadeUp">
    <div class="modal-header">
      <div class="modal-title" id="taskModalTitle">✨ Новая задача</div>
      <button class="modal-close" onclick="closeModal('taskModal')">✕</button>
    </div>
    <div class="form-group">
      <label for="taskName">Название задачи</label>
      <input type="text" id="taskName" class="form-input" placeholder="Например: Написать тесты">
      <div class="form-error" id="taskNameError" style="display:none;">⚠ Введите название</div>
    </div>
    <div class="form-group">
      <label for="taskDesc">Описание</label>
      <textarea id="taskDesc" class="form-textarea" placeholder="Что нужно сделать..."></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="form-group" style="margin-bottom:0;">
        <label for="taskDeadline">Срок выполнения</label>
        <input type="date" id="taskDeadline" class="form-input">
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label for="taskAssignee">Исполнитель</label>
        <input type="text" id="taskAssignee" class="form-input" placeholder="Имя исполнителя">
      </div>
    </div>
    <div class="form-group" style="margin-top:16px;">
      <label>Приоритет</label>
      <div class="priority-selector">
        <button class="priority-btn" data-p="high"   onclick="selectPriority(this)">🔴 Высокий</button>
        <button class="priority-btn" data-p="medium" onclick="selectPriority(this)">🟡 Средний</button>
        <button class="priority-btn" data-p="low"    onclick="selectPriority(this)">🟢 Низкий</button>
      </div>
    </div>
    <input type="hidden" id="taskTargetCol" value="todo">
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('taskModal')">Отмена</button>
      <button class="btn-primary" onclick="saveTask()">Сохранить задачу</button>
    </div>
  </div>
</div>

<!-- ══ МОДАЛКА: ПРОСМОТР ЗАДАЧИ ══ -->
<div class="modal-overlay" id="viewModal" onclick="closeModalOutside(event,'viewModal')">
  <div class="modal task-modal animate-fadeUp">
    <div class="modal-header">
      <div class="modal-title" id="viewTitle">Название задачи</div>
      <button class="modal-close" onclick="closeModal('viewModal')">✕</button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
      <span id="viewBadgePriority" class="badge"></span>
      <span id="viewBadgeStatus"   class="badge badge-primary"></span>
    </div>
    <p id="viewDesc" style="margin-bottom:16px;"></p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;">
      <div>
        <div class="text-xs text-secondary" style="margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Срок</div>
        <div id="viewDeadline" style="font-size:13px;color:var(--text);font-weight:500;"></div>
      </div>
      <div>
        <div class="text-xs text-secondary" style="margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Исполнитель</div>
        <div id="viewAssignee" style="font-size:13px;color:var(--text);font-weight:500;"></div>
      </div>
    </div>
    <hr class="hr">
    <div class="comments-section">
      <div style="font-family:'Sora',sans-serif;font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;">💬 Комментарии</div>
      <div id="commentsList">
        <div class="comment-item">
          <div class="comment-avatar">А</div>
          <div class="comment-body">
            <div class="comment-author">Аружан</div>
            <div class="comment-text">Начала работу, нужно уточнить требования по адаптиву.</div>
            <div class="comment-time">2 дня назад</div>
          </div>
        </div>
      </div>
      <div class="comment-input-row">
        <div class="comment-avatar" style="background:var(--primary);flex-shrink:0;">А</div>
        <input type="text" id="commentInput" class="form-input" placeholder="Написать комментарий..."
          onkeydown="if(event.key==='Enter') addComment()">
        <button class="btn-primary btn-sm" onclick="addComment()" style="flex-shrink:0;">Отправить</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('viewModal')">Закрыть</button>
      <button class="btn-primary" onclick="closeModal('viewModal')">Готово</button>
    </div>
  </div>
</div>

<script>
  // ── Тема ──
  if (localStorage.getItem('nikomi-theme') === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('themeIcon').textContent  = '☀️';
    document.getElementById('themeLabel').textContent = 'Светлая тема';
  }
  document.getElementById('themeToggle').addEventListener('click', () => {
    const isDark = document.body.classList.toggle('dark');
    document.getElementById('themeIcon').textContent  = isDark ? '☀️' : '🌙';
    document.getElementById('themeLabel').textContent = isDark ? 'Светлая тема' : 'Тёмная тема';
    localStorage.setItem('nikomi-theme', isDark ? 'dark' : 'light');
  });

  // ── Drag & Drop ──
  let dragCard = null;
  function onDragStart(e) { dragCard = e.currentTarget; dragCard.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
  function onDragEnd(e)   { e.currentTarget.classList.remove('dragging'); dragCard = null; document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over')); }
  function onDragOver(e)  { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
  function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
  function onDrop(e, targetCol) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (!dragCard || dragCard.dataset.col === targetCol) return;
    const list = document.getElementById('list-' + targetCol);
    dragCard.dataset.col = targetCol;
    const titleEl = dragCard.querySelector('.task-title');
    if (targetCol === 'done') {
      dragCard.style.opacity = '0.75';
      titleEl.style.textDecoration = 'line-through';
      titleEl.style.color = 'var(--text-secondary)';
      dragCard.classList.remove('overdue','soon');
    } else {
      dragCard.style.opacity = '';
      titleEl.style.textDecoration = '';
      titleEl.style.color = '';
    }
    dragCard.style.opacity = '0';
    list.appendChild(dragCard);
    setTimeout(() => { dragCard.style.opacity = targetCol === 'done' ? '0.75' : '1'; }, 50);
    updateCounts();
  }
  function updateCounts() {
    ['todo','doing','done'].forEach(col => {
      document.getElementById('count-' + col).textContent =
        document.getElementById('list-' + col).querySelectorAll('.task-card').length;
    });
  }

  // ── Дропдаун ──
  function toggleDropdown(btn) {
    const menu = btn.nextElementSibling;
    const isOpen = menu.style.display === 'block';
    document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display = 'none');
    menu.style.display = isOpen ? 'none' : 'block';
  }
  document.addEventListener('click', e => {
    if (!e.target.closest('.dropdown'))
      document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display = 'none');
  });

  // ── Удалить задачу ──
  function deleteTask(item) {
    const card = item.closest('.task-card');
    if (confirm('Удалить задачу?')) {
      card.style.transition = 'opacity 0.3s, transform 0.3s';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.9)';
      setTimeout(() => { card.remove(); updateCounts(); }, 280);
    }
  }

  // ── Поиск ──
  function filterTasks() {
    const query    = document.getElementById('searchInput').value.toLowerCase();
    const priority = document.getElementById('filterPriority').value;
    document.querySelectorAll('.task-card').forEach(card => {
      const title = card.querySelector('.task-title').textContent.toLowerCase();
      card.style.display = (title.includes(query) && (priority === 'all' || card.dataset.priority === priority)) ? '' : 'none';
    });
    updateCounts();
  }

  // ── Приоритет ──
  let selectedPriority = 'medium';
  function selectPriority(btn) {
    document.querySelectorAll('.priority-btn').forEach(b => b.className = 'priority-btn');
    btn.classList.add('active-' + btn.dataset.p);
    selectedPriority = btn.dataset.p;
  }

  // ── Создать задачу ──
  let editingTaskId = null;
  function openTaskModal(col = 'todo') {
    document.getElementById('taskModalTitle').textContent = '✨ Новая задача';
    ['taskName','taskDesc','taskDeadline','taskAssignee'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('taskNameError').style.display = 'none';
    document.getElementById('taskTargetCol').value = col;
    selectedPriority = 'medium';
    document.querySelectorAll('.priority-btn').forEach(b => {
      b.className = 'priority-btn';
      if (b.dataset.p === 'medium') b.classList.add('active-medium');
    });
    editingTaskId = null;
    document.getElementById('taskModal').classList.add('open');
    setTimeout(() => document.getElementById('taskName').focus(), 100);
  }
  function openEditTask(item) {
    const card = item.closest('.task-card');
    editingTaskId = card.dataset.taskId;
    document.getElementById('taskModalTitle').textContent = '✏️ Редактировать задачу';
    document.getElementById('taskName').value = card.querySelector('.task-title').textContent.trim().replace(/^[^\s]+\s/, '');
    const desc = card.querySelector('.task-desc');
    document.getElementById('taskDesc').value = desc ? desc.textContent.trim() : '';
    document.getElementById('taskModal').classList.add('open');
  }
  async function saveTask() {
    const name     = document.getElementById('taskName').value.trim();
    const desc     = document.getElementById('taskDesc').value.trim();
    const deadline = document.getElementById('taskDeadline').value;
    const assignee = document.getElementById('taskAssignee').value.trim();
    const col      = document.getElementById('taskTargetCol').value;
    if (!name) {
      document.getElementById('taskName').classList.add('error');
      document.getElementById('taskNameError').style.display = 'flex';
      return;
    }
    try {
      if (editingTaskId) {
        await window.firestoreAPI.updateTask(editingTaskId, {
          name, description: desc, deadline: deadline || null, assignee: assignee || ''
        });
      } else {
        await window.firestoreAPI.createTask({
          name, description: desc, deadline: deadline || null, assignee: assignee || '',
          status: col, priority: selectedPriority
        });
      }
      closeModal('taskModal');
      loadTasks();
    } catch (err) {
      alert('Ошибка при сохранении задачи: ' + err.message);
    }
  }

  // ── Просмотр задачи ──
  function openViewModal(card) {
    const title    = card.querySelector('.task-title').textContent.trim();
    const desc     = card.querySelector('.task-desc')?.textContent.trim() || 'Описание не указано.';
    const deadline = card.querySelector('.task-deadline')?.textContent.trim() || '—';
    const prio     = card.dataset.priority;
    const col      = card.dataset.col;
    const prioLabels = {high:'🔴 Высокий',medium:'🟡 Средний',low:'🟢 Низкий'};
    const prioBadge  = {high:'badge-error',medium:'badge-warning',low:'badge-success'};
    const colLabels  = {todo:'К выполнению',doing:'В процессе',done:'Выполнено'};
    document.getElementById('viewTitle').textContent    = title;
    document.getElementById('viewDesc').textContent     = desc;
    document.getElementById('viewDeadline').textContent = deadline;
    document.getElementById('viewAssignee').textContent = card.dataset.assignee || 'Не назначен';
    const prioEl = document.getElementById('viewBadgePriority');
    prioEl.textContent = prioLabels[prio] || '';
    prioEl.className   = 'badge ' + (prioBadge[prio] || '');
    const statusEl = document.getElementById('viewBadgeStatus');
    statusEl.textContent = colLabels[col] || '';
    document.getElementById('viewModal').classList.add('open');
  }

  function addComment() {
    const input = document.getElementById('commentInput');
    const text  = input.value.trim();
    if (!text) return;
    const list = document.getElementById('commentsList');
    const item = document.createElement('div');
    item.className = 'comment-item animate-fadeIn';
    item.innerHTML = `
      <div class="comment-avatar" style="background:var(--primary);">${window.currentUser?.displayName?.charAt(0).toUpperCase() || 'А'}</div>
      <div class="comment-body">
        <div class="comment-author">${window.currentUser?.displayName || 'Пользователь'}</div>
        <div class="comment-text">${text}</div>
        <div class="comment-time">Только что</div>
      </div>`;
    list.appendChild(item);
    input.value = '';
  }

  function closeModal(id)           { document.getElementById(id).classList.remove('open'); }
  function closeModalOutside(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal('taskModal'); closeModal('viewModal'); }
  });

  function updateSubtitle() {
    const total = document.querySelectorAll('.task-card').length;
    const done = document.querySelectorAll('.task-card[data-col="done"]').length;
    document.getElementById('projectSubtitle').textContent = 
      `${total} ${total === 1 ? 'задача' : total < 5 ? 'задачи' : 'задач'} · ${done} ${done === 1 ? 'выполнена' : done < 5 ? 'выполнено' : 'выполнено'}`;
  }
</script>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc, query, where, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDyPmcU4gYJPNp9N-xN1KHxXR9bPsn-x2I",
    authDomain: "nikomi-a7429.firebaseapp.com",
    projectId: "nikomi-a7429",
    storageBucket: "nikomi-a7429.firebasestorage.app",
    messagingSenderId: "845534967375",
    appId: "1:845534967375:web:cf9085ce87c71d4d5d1c3a",
    measurementId: "G-GWMMF7896E"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let currentUser = null;
  let currentProjectId = null;

  const urlParams = new URLSearchParams(window.location.search);
  currentProjectId = urlParams.get('project');

  if (!currentProjectId) {
    alert('Проект не выбран');
    window.location.href = 'dashboard.html';
  }

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = 'login.html';
    } else {
      currentUser = user;
      window.currentUser = user;
      loadProject();
      loadTasks();
    }
  });

  document.querySelector('.sidebar-item[href="login.html"]').addEventListener('click', async (e) => {
    e.preventDefault();
    if (confirm('Выйти из аккаунта?')) {
      await signOut(auth);
      window.location.href = 'login.html';
    }
  });

  window.firestoreAPI = {
    async createTask(data) {
      const taskData = {
        projectId: currentProjectId,
        userId: currentUser.uid,
        name: data.name,
        description: data.description || '',
        deadline: data.deadline || null,
        assignee: data.assignee || '',
        status: data.status || 'todo',
        priority: data.priority || 'medium',
        createdAt: serverTimestamp()
      };
      const docRef = await addDoc(collection(db, 'tasks'), taskData);
      return docRef.id;
    },

    async getTasks() {
      const q = query(
        collection(db, 'tasks'),
        where('projectId', '==', currentProjectId)
      );
      const snapshot = await getDocs(q);
      return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    },

    async updateTask(taskId, data) {
      const docRef = doc(db, 'tasks', taskId);
      await updateDoc(docRef, data);
    },

    async deleteTask(taskId) {
      await deleteDoc(doc(db, 'tasks', taskId));
    }
  };

  async function loadProject() {
    try {
      const docRef = doc(db, 'projects', currentProjectId);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        const project = docSnap.data();
        document.getElementById('projectTitle').textContent = '📁 ' + project.name;
      } else {
        alert('Проект не найден');
        window.location.href = 'dashboard.html';
      }
    } catch (err) {
      console.error('Ошибка загрузки проекта:', err);
    }
  }

  async function loadTasks() {
    try {
      const tasks = await window.firestoreAPI.getTasks();
      
      ['todo', 'doing', 'done'].forEach(col => {
        document.getElementById('list-' + col).innerHTML = '';
      });

      showTaskReminders(tasks);

      for (const task of tasks) {
        const prioLabels = {high:'🔴 Высокий',medium:'🟡 Средний',low:'🟢 Низкий'};
        const prioBadge  = {high:'badge-error',medium:'badge-warning',low:'badge-success'};
        
        let dateText = '';
        let deadlineClass = 'task-deadline';
        let cardClass = '';

        if (task.deadline) {
          const deadlineDate = new Date(task.deadline);
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          deadlineDate.setHours(0, 0, 0, 0);
          const diffDays = Math.ceil((deadlineDate - today) / (1000 * 60 * 60 * 24));

          dateText = deadlineDate.toLocaleDateString('ru-RU', {day:'numeric',month:'short'});

          if (diffDays < 0 && task.status !== 'done') {
            deadlineClass = 'task-deadline overdue';
            cardClass = 'overdue';
            dateText = '⚠️ Просрочена — ' + dateText;
          } else if (diffDays === 0 && task.status !== 'done') {
            deadlineClass = 'task-deadline soon';
            cardClass = 'soon';
            dateText = '⏰ Сегодня';
          } else if (diffDays <= 3 && task.status !== 'done') {
            deadlineClass = 'task-deadline soon';
            cardClass = 'soon';
            dateText = '⏰ ' + dateText;
          } else {
            dateText = '📅 ' + dateText;
          }
        }

        const initials = task.assignee ? task.assignee.charAt(0).toUpperCase() : currentUser.displayName?.charAt(0).toUpperCase() || 'А';
        const colors = ['#3AB0A8','#6B7280','#E57373','#4CAF50'];
        const color = colors[Math.floor(Math.random() * colors.length)];

        const card = document.createElement('div');
        card.className = `task-card animate-fadeUp ${cardClass}`;
        card.draggable = true;
        card.dataset.taskId = task.id;
        card.dataset.priority = task.priority;
        card.dataset.col = task.status;
        card.dataset.assignee = task.assignee || '';
        card.addEventListener('dragstart', onDragStart);
        card.addEventListener('dragend', onDragEnd);
        card.addEventListener('click', () => openViewModal(card));

        if (task.status === 'done') {
          card.style.opacity = '0.75';
        }

        card.innerHTML = `
          <div class="task-top">
            <div class="task-title" ${task.status === 'done' ? 'style="text-decoration:line-through;color:var(--text-secondary);"' : ''}>📌 ${task.name}</div>
            <div class="dropdown" onclick="event.stopPropagation()">
              <button class="task-dots-btn" onclick="toggleDropdown(this)">⋯</button>
              <div class="dropdown-menu">
                <div class="dropdown-item" onclick="openEditTask(this)">✏️ Редактировать</div>
                <div class="dropdown-item danger" onclick="deleteTask(this)">🗑 Удалить</div>
              </div>
            </div>
          </div>
          ${task.description ? `<p class="task-desc">${task.description}</p>` : ''}
          <div class="task-tags">
            <span class="badge ${prioBadge[task.priority]}">${prioLabels[task.priority]}</span>
            ${task.status === 'done' ? '<span class="badge badge-success">✓ Готово</span>' : ''}
          </div>
          <div class="task-footer">
            <span class="${deadlineClass}">${dateText || '—'}</span>
            <div class="task-avatar" style="background:${color};">${initials}</div>
          </div>
        `;

        document.getElementById('list-' + task.status).appendChild(card);
      }

      updateCounts();
      updateSubtitle();
    } catch (err) {
      console.error('Ошибка загрузки задач:', err);
      alert('Ошибка загрузки задач: ' + err.message);
    }
  }

  function showTaskReminders(tasks) {
    const container = document.getElementById('taskAlertsContainer');
    container.innerHTML = '';

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    for (const task of tasks) {
      if (!task.deadline || task.status === 'done') continue;

      const deadlineDate = new Date(task.deadline);
      deadlineDate.setHours(0, 0, 0, 0);
      const diffDays = Math.ceil((deadlineDate - today) / (1000 * 60 * 60 * 24));

      let alertType = '';
      let mascotImg = '';
      let message = '';

      if (diffDays < 0) {
        alertType = 'error';
        mascotImg = 'pers/angry.png';
        message = `<strong>Задача просрочена! 🔥</strong><br>Задача «${task.name}» должна была быть выполнена. Срочно!`;
      } else if (diffDays === 0) {
        alertType = 'warn';
        mascotImg = 'pers/mangry.png';
        message = `<strong>Эй, дедлайн сегодня! ⏰</strong><br>Задача «${task.name}» истекает сегодня. Давай быстрее!`;
      }

      if (alertType) {
        const alert = document.createElement('div');
        alert.className = `notification ${alertType} mascot-alert animate-fadeUp`;
        alert.innerHTML = `
          <img src="${mascotImg}" alt="" class="notif-mascot-img">
          <div class="notif-text">${message}</div>
          <button onclick="this.closest('.notification').style.display='none'"
            style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-secondary);flex-shrink:0;border-radius:50%;width:32px;height:32px;transition:all 0.3s;"
            onmouseover="this.style.background='rgba(${alertType === 'error' ? '229,115,115' : '248,201,93'},0.15)';this.style.color='var(--${alertType === 'error' ? 'error' : 'warning'})'"
            onmouseout="this.style.background='none';this.style.color='var(--text-secondary)'">✕</button>
        `;
        container.appendChild(alert);
      }
    }
  }

  window.loadTasks = loadTasks;
</script>
</body>
</html>
